# Nginx reverse proxy for privamesh.org -> Next.js (next start on :3000)
# This is a SEPARATE server block; it does not touch your existing n8n config.
#
# Install:
#   sudo cp deploy/nginx-privamesh.conf /etc/nginx/sites-available/privamesh
#   sudo ln -s /etc/nginx/sites-available/privamesh /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then add HTTPS with:  sudo certbot --nginx -d privamesh.org -d www.privamesh.org

server {
    listen 80;
    listen [::]:80;
    server_name privamesh.org www.privamesh.org;

    # Larger bodies for the blog ingestion API (POST /api/blog)
    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }
}
